# Composite Actionの表示名
name: Lint and Test

# このアクションの役割を説明する
description: Install dependencies, run ESLint, and run tests

# 呼び出し元から変更できる値
inputs:
  node-version:
    description: Node.js version
    required: false
    default: "20"

  test-command:
    description: Command used to run tests
    required: false
    default: "npm test"

# 呼び出し元へ返す値
outputs:
  test-status:
    description: Test result status
    # idがtestのステップの実行結果を返す
    value: ${{ steps.test.outcome }}

runs:
  # 複数ステップをまとめたComposite Actionであることを示す
  using: composite

  steps:
    - name: Set up Node.js
      # 教材ではv4ですが、現在のメジャーバージョンを使用する
      # 総合演習ではタグ指定を完全なコミットSHAへ変更する
      #uses: actions/setup-node@v6
      # 完全なコミットSHAでv6.4.0へ固定する
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        # inputsで受け取ったNode.jsバージョンを使用する
        node-version: ${{ inputs.node-version }}

        # package-lock.jsonを基にnpmキャッシュを利用する
        cache: npm

    - name: Install dependencies
      # Composite Actionのrunステップではshellの明示が必要
      shell: bash

      # package-lock.jsonと完全に一致する依存関係をインストールする
      run: npm ci

    - name: Run ESLint
      shell: bash

      # package.jsonのlintスクリプトを実行する
      run: npm run lint

    - name: Run tests
      # outputsから参照するため、ステップにidを付ける
      id: test

      # ここで直ちに停止せず、結果を後続ステップで判定する
      continue-on-error: true

      shell: bash

      # 入力値をrunへ直接埋め込まず、一度環境変数へ渡す
      env:
        TEST_COMMAND: ${{ inputs.test-command }}

      # 環境変数に入れたテストコマンドを実行する
      run: bash -c "$TEST_COMMAND"

    - name: Fail action when tests fail
      # テストが失敗した場合だけ実行する
      if: steps.test.outcome == 'failure'

      shell: bash

      # 終了コード1を返して、Action全体を失敗にする
      run: exit 1
