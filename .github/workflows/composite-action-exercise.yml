name: Composite Action Exercise

on:
  # GitHubのActions画面から手動実行できるようにする
  workflow_dispatch:

  # main向けPull Requestでも実行する
  pull_request:
    branches:
      - main

# ワークフロー全体では権限を与えない
permissions: {}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    # このジョブに必要な読み取り権限だけを与える
    permissions:
      contents: read

    steps:
      - name: Check out repository
        # リポジトリ内のローカルActionを使うため、
        # 先にファイルをランナーへ取得する必要がある
        uses: actions/checkout@v6

      - name: Run lint-and-test action
        # 後続ステップから出力を参照するためのid
        id: quality-check

        # 同じリポジトリ内のComposite Actionを相対パスで呼ぶ
        uses: ./.github/actions/lint-and-test

        with:
          node-version: "20"

          # Vitestが待機状態になる場合は
          # npm test -- --run に変更する
          test-command: "npm test"

      - name: Show test result
        # 前のステップが失敗した場合でも実行する
        if: always()

        shell: bash

        # Composite Actionが返した結果を環境変数へ入れる
        env:
          TEST_STATUS: ${{ steps.quality-check.outputs.test-status }}

        # |を使うことで、後ろをシェルコマンドとして安全に記述する
        run: |
          echo "Test status: $TEST_STATUS"
