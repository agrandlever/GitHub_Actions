name: Composite Action Exercise

on:
  # GitHubのActions画面から手動実行できるようにする
  workflow_dispatch:

  # main向けPull Requestでも実行する
  pull_request:
    branches:
      - main

# ワークフロー全体では、GITHUB_TOKENの権限をいったん無効にする
permissions: {}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    # このジョブに必要な読み取り権限だけを与える
    permissions:
      contents: read

    steps:
      - name: Check out repository
        # ローカルのComposite Actionを利用するため、
        # リポジトリのファイルをランナーへ取得する
        uses: actions/checkout@v6

      - name: Run lint-and-test action
        # 後続ステップから出力を参照するための識別名
        id: quality-check

        # 同じリポジトリ内のComposite Actionを呼び出す
        uses: ./.github/actions/lint-and-test

        with:
          node-version: "20"

          # package.jsonに定義されたJestのテストを実行する
          test-command: "npm test"

      - name: Show test result
        # 前のステップが失敗した場合でも実行する
        if: always()

        shell: bash

        # Composite Actionが返した出力を環境変数へ入れる
        env:
          TEST_STATUS: ${{ steps.quality-check.outputs.test-status }}

        # 複数行文字列にして、コロンを含むコマンドを安全に記述する
        run: |
          echo "Test status: $TEST_STATUS"
