# Actions画面に表示するワークフロー名
name: Full CI/CD Pipeline

on:
  # デフォルトブランチへ配置後、Actions画面から手動実行できる
  workflow_dispatch:

  # main向けPull Requestで品質とビルドを確認する
  pull_request:
    branches:
      - main

  # Pull Requestがmainへマージされた後にも実行する
  push:
    branches:
      - main

# ワークフロー全体では、GITHUB_TOKENの権限を無効にする
permissions: {}

jobs:
  # ============================================
  # Stage 1：Lintとテスト
  # ============================================
  quality:
    name: Quality Check

    # Reusable Workflowへ渡す権限は読み取りだけに限定する
    permissions:
      contents: read

    # 演習2で作成したReusable Workflowを呼び出す
    # Reusable Workflowはstepsではなく、ジョブの直下で呼び出す
    uses: ./.github/workflows/reusable-ci.yml

    with:
      # reusable-ci.ymlのworkflow_call.inputsへ渡す
      node-version: "20"

  # ============================================
  # Stage 2：ビルド
  # ============================================
  build:
    name: Build Application

    # Quality Checkが成功してからビルドする
    needs: quality

    # ビルドジョブを実行するランナー
    runs-on: ubuntu-latest

    # リポジトリ取得に必要な読み取り権限だけを与える
    permissions:
      contents: read

    steps:
      - name: Check out repository
        # Dependabotで更新された完全長SHAを使用する
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

        with:
          # このジョブではgit pushを行わないため、
          # checkout後に認証情報を残さない
          persist-credentials: false

      - name: Set up Node.js
        # 現在Composite Actionでも使用しているSHAへ固定する
        # Dependabotが新しいバージョンを検出した場合は更新PRが作られる
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

        with:
          # ローカルとGitHub ActionsでNode.jsのバージョンをそろえる
          node-version: "20"

          # package-lock.jsonを使ってnpmキャッシュを管理する
          cache: npm

      - name: Install dependencies
        # package-lock.jsonと完全に一致する依存関係をインストールする
        run: npm ci

      - name: Build application
        # package.jsonのbuildスクリプトを実行する
        run: npm run build

      - name: Verify build output
        shell: bash

        run: |
          # distフォルダーが存在しなければ失敗させる
          test -d dist

          # dist内にファイルが1個以上あるか確認する
          test -n "$(find dist -type f -print -quit)"

          # ログでビルド成果物を確認できるようにする
          echo "Build output:"
          find dist -type f -print

      - name: Upload build artifact
        # 外部Actionを安全に利用するため、v7.0.1の完全長SHAへ固定する
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1

        with:
          # 後のデプロイジョブが、この名前を指定してダウンロードする
          name: dist-build

          # npm run buildで生成されたフォルダーを保存する
          path: dist/

          # dist内にファイルがなければ、警告ではなくジョブを失敗させる
          if-no-files-found: error

          # 学習用の成果物なので、GitHub Actions上には7日間保存する
          retention-days: 7

  # ============================================
  # Stage 3：デプロイ用Artifactの受け取り確認
  # ============================================
  deploy:
    name: Deployment Artifact Check

    # buildジョブが成功してから、このジョブを開始する
    needs: build

    # buildジョブとは別の新しいランナーで実行される
    runs-on: ubuntu-latest

    # 今回はArtifactを受け取るだけなので、
    # GITHUB_TOKENのリポジトリ権限は与えない
    permissions: {}

    steps:
      - name: Download build artifact
        # dist-buildを別ジョブのランナーへダウンロードする
        # 外部Actionはv8.0.1の完全長SHAへ固定する
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

        with:
          # buildジョブのupload-artifactで付けた名前と一致させる
          name: dist-build

          # ダウンロードしたファイルをdistフォルダーへ展開する
          path: dist/

      - name: Verify downloaded artifact
        shell: bash

        run: |
          # ダウンロード先のdistフォルダーが存在するか確認する
          test -d dist

          # dist内にファイルが1個以上存在するか確認する
          test -n "$(find dist -type f -print -quit)"

          # 受け取ったファイルをActionsのログへ表示する
          echo "Downloaded deployment files:"
          find dist -type f -print
