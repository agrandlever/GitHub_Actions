name: Chapter 7 Cache and Artifact

# GitHubのActions画面から手動実行する
on:
  workflow_dispatch:

jobs:
  create-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: 練習用キャッシュを復元
        id: demo-cache
        uses: actions/cache@v6
        with:
          # このフォルダを次回の実行でも再利用する
          path: .chapter7-cache

          # 同じOS・同じキーなら、前回のキャッシュが復元される
          key: chapter7-demo-${{ runner.os }}-v1

      - name: キャッシュがない場合だけファイルを作成
        # 初回実行ではキャッシュがないため、このステップが動く
        # 2回目以降に完全一致すれば、このステップはスキップされる
        if: steps.demo-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .chapter7-cache

          echo "このファイルはキャッシュの初回作成時に生成されました。" \
            > .chapter7-cache/cache.txt

          echo "created-at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            >> .chapter7-cache/cache.txt

      - name: キャッシュ結果をtrueまたはfalseに整える
        id: cache-status
        shell: bash
        run: |
          # キャッシュミス時の出力は空文字になるため、
          # 分かりやすいfalseに変換する
          if [ "${{ steps.demo-cache.outputs.cache-hit }}" = "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: キャッシュ内容を確認
        shell: bash
        run: |
          echo "cache-hit=${{ steps.cache-status.outputs.value }}"
          echo "キャッシュに入っているファイル:"
          cat .chapter7-cache/cache.txt

      - name: アーティファクト用ファイルを作成
        shell: bash
        run: |
          # アーティファクトとして保存するフォルダを作る
          mkdir -p output

          echo "run-number=${{ github.run_number }}" \
            > output/result.txt

          echo "cache-hit=${{ steps.cache-status.outputs.value }}" \
            >> output/result.txt

          echo "--- キャッシュの内容 ---" \
            >> output/result.txt

          cat .chapter7-cache/cache.txt \
            >> output/result.txt

      - name: 結果をアーティファクトとしてアップロード
        uses: actions/upload-artifact@v7
        with:
          # GitHubの実行画面に表示される名前
          name: chapter7-result

          # 保存するフォルダ
          path: output/

          # ファイルがなければエラーにする
          if-no-files-found: error

  verify-artifact:
    # create-artifactが成功した後で実行する
    needs: create-artifact

    runs-on: ubuntu-latest

    steps:
      - name: アーティファクトをダウンロード
        uses: actions/download-artifact@v8
        with:
          # アップロード時と同じ名前を指定する
          name: chapter7-result

          # このジョブ内で展開する場所
          path: downloaded/

      - name: ダウンロードした内容を確認
        shell: bash
        run: |
          echo "ダウンロードしたファイル:"
          find downloaded -type f -print

          echo "result.txtの内容:"
          cat downloaded/result.txt
